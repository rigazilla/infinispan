name: Maven Build and Test

on:
  push:
    branches:
      - 14.0.x
  pull_request:
    branches:
      - 14.0.x

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Maven Install
        run: |
            # Ensure this plugin is built first to avoid warnings in the build
            ./mvnw -s maven-settings.xml install -B -Pdistribution
            # By using "dependency:resolve", it will download all dependencies used in later stages for running the tests
            ./mvnw -s maven-settings.xml install dependency:resolve -B -V -e -DskipTests -DexcludeGroupIds=org.infinispan -Dsilent=true

      - name: Maven Verify
        run: |
            CLIENTS=$(find client -maxdepth 2 -name pom.xml -exec dirname {} \; | paste -sd ',' -)
            ./mvnw -s maven-settings.xml verify -V -B -e -DrerunFailingTestsCount=2 \
            -Dmaven.test.failure.ignore=true -Dansi.strip=true \
            -pl core,$CLIENTS \
            -Dgithub.action=true

      - name: Publish Test Report
        if: (success() || failure()) && steps.job-status.outputs.job_status == 'success'
        # Waiting for https://github.com/ScaCap/action-surefire-report/pull/251
        uses: rigazilla/action-surefire-report@summary
        with:
            check_name: Test Report Result
            ignore_flaky_tests: true
            report_paths: |
              **/*-reports*/**/TEST-*.xml
              !**/*FLAKY*.xml
